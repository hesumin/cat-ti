name: Deploy CatTI to Cloudflare Pages

on:
  push:
    branches:
      - main
    paths:
      - "cat-ti/**"
      - ".github/workflows/deploy-cat-ti.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy CatTI
        uses: cloudflare/pages-action@1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: cat-ti
          directory: ./cat-ti
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: main
