name: Deploy NBTI to Cloudflare Pages

on:
  push:
    branches:
      - main
    paths:
      - "index.html"
      - "cat-ti/**"
      - "dog-ti/**"
      - "mou-ti/**"
      - ".github/workflows/deploy-nbti.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure nb-ti project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        shell: bash
        run: |
          set -euo pipefail

          status=$(curl -sS -o /tmp/cf-pages-project.json -w "%{http_code}" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/nb-ti")

          case "${status}" in
            200)
              echo "Cloudflare Pages project nb-ti already exists"
              ;;
            404)
              npx wrangler@4 pages project create nb-ti --production-branch main
              ;;
            *)
              echo "Cloudflare API check failed for nb-ti, HTTP ${status}"
              cat /tmp/cf-pages-project.json
              exit 1
              ;;
          esac

      - name: Deploy NBTI
        uses: cloudflare/pages-action@1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: nb-ti
          directory: .
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: main


