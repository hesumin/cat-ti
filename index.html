<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CatTI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fff;
      font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    #app {
      width: 100%;
      max-width: 480px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    /* ===================== 首页 ===================== */
    #start-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px 32px;
      background: #fff;
    }

    /* 像素风大标题 */
    .pixel-title {
      font-size: 56px;
      font-weight: 900;
      letter-spacing: 8px;
      color: #111;
      font-family: 'Arial Black', 'Arial', sans-serif;
      text-transform: uppercase;
      line-height: 1;
      margin-bottom: 28px;
      /* 像素化效果：使用 text-shadow 模拟像素块感 */
      image-rendering: pixelated;
    }

    /* 像素猫咪图阵 */
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }

    /* 主标语 */
    .main-slogan {
      font-size: 22px;
      font-weight: 900;
      color: #111;
      margin-bottom: 8px;
      text-align: center;
      letter-spacing: 1px;
    }

    .sub-slogan {
      font-size: 14px;
      color: #999;
      margin-bottom: 36px;
      text-align: center;
      font-style: italic;
    }
    .sub-slogan::before { content: '"'; }
    .sub-slogan::after { content: '"'; }

    /* 大黑按钮 */
    .start-btn {
      width: 100%;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 18px 0;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: transform 0.15s;
      margin-bottom: 28px;
    }

    .start-btn:active { transform: scale(0.97); }

    .start-btn .play-icon {
      width: 26px;
      height: 26px;
      border: 2.5px solid #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .start-btn .play-icon::after {
      content: '';
      border-left: 9px solid #fff;
      border-top: 6px solid transparent;
      border-bottom: 6px solid transparent;
      margin-left: 2px;
    }

    .footer-note {
      font-size: 12px;
      color: #bbb;
      text-align: center;
    }

    .footer-note span { color: #ff6b6b; }

    /* ===================== 题目页 ===================== */
    #quiz-page {
      display: none;
      flex-direction: column;
      padding: 0;
      min-height: 100vh;
      background: #fff;
    }

    /* 顶部导航 */
    .quiz-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px 12px;
      border-bottom: 1px solid #eee;
    }

    .back-btn {
      width: 38px;
      height: 38px;
      background: #f5f5f5;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: #333;
    }

    .q-progress-text {
      font-size: 15px;
      color: #999;
      font-weight: 500;
    }

    .nav-placeholder { width: 38px; }

    /* 进度条 */
    .progress-track {
      width: 100%;
      height: 3px;
      background: #f0f0f0;
    }

    .progress-fill {
      height: 100%;
      background: #111;
      transition: width 0.4s ease;
    }

    /* 题目内容区 */
    .quiz-body {
      padding: 24px 20px 0;
      flex: 1;
    }

    /* 题目角色提示气泡 */
    .q-hint {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .q-hint-avatar {
      font-size: 32px;
      background: #f5f5f5;
      border-radius: 12px;
      width: 52px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .q-hint-bubble {
      background: #f5f5f5;
      border-radius: 0 12px 12px 12px;
      padding: 10px 14px;
      font-size: 13px;
      color: #999;
      flex: 1;
    }

    .question-text {
      font-size: 20px;
      font-weight: 800;
      color: #111;
      line-height: 1.5;
      margin-bottom: 24px;
    }

    /* 选项列表 */
    .options-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 24px;
    }

    .option-item {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 16px 18px;
      border: 2px solid #e8e8e8;
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.2s;
      background: #fff;
    }

    .option-item:hover {
      border-color: #bbb;
      background: #fafafa;
    }

    .option-item.selected {
      background: #111;
      border-color: #111;
      color: #fff;
    }

    .option-item.selected .option-label {
      color: #fff;
      border-color: #fff;
    }

    .option-label {
      font-size: 13px;
      font-weight: 700;
      color: #bbb;
      border: 1.5px solid #e0e0e0;
      border-radius: 6px;
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .option-text {
      font-size: 15px;
      line-height: 1.5;
      flex: 1;
    }

    /* 继续按钮 */
    .continue-btn {
      width: calc(100% - 40px);
      margin: 0 20px 32px;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 17px 0;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 2px;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.2s;
    }

    .continue-btn:active { transform: scale(0.97); }
    .continue-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ===================== 结果页 ===================== */
    #result-page {
      display: none;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px 40px;
      background: #fff;
      min-height: 100vh;
    }

    .result-label {
      font-size: 13px;
      color: #999;
      margin-bottom: 8px;
      letter-spacing: 2px;
    }

    .result-breed {
      font-size: 36px;
      font-weight: 900;
      color: #111;
      margin-bottom: 4px;
    }

    .result-en {
      font-size: 14px;
      color: #bbb;
      margin-bottom: 24px;
      letter-spacing: 1px;
    }

    .result-avatar {
      font-size: 100px;
      background: #f5f5f5;
      border-radius: 28px;
      width: 160px;
      height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
    }

    .result-traits {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 20px;
    }

    .result-trait {
      background: #111;
      color: #fff;
      font-size: 13px;
      padding: 5px 14px;
      border-radius: 20px;
      font-weight: 600;
    }

    .result-desc {
      font-size: 15px;
      color: #555;
      line-height: 1.8;
      text-align: justify;
      margin-bottom: 36px;
      background: #f8f8f8;
      border-radius: 16px;
      padding: 18px;
    }

    .retry-btn {
      width: 100%;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 17px 0;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 2px;
      cursor: pointer;
      margin-bottom: 16px;
    }

    .result-footer {
      font-size: 12px;
      color: #ccc;
    }

    /* 页面切换动画 */
    .page-in {
      animation: slideIn 0.35s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(30px); }
      to { opacity: 1; transform: translateX(0); }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- ===== 首页 ===== -->
  <div id="start-page">
    <div class="pixel-title">CATTI</div>

    <img src="banner.jpg" alt="sumin banner" style="width:100%;border-radius:16px;margin-bottom:20px;object-fit:cover;max-height:240px;">

    </button>

    <div class="footer-note">来小红书找我玩 <span>@sumin</span> · DogTI也来啦🐶</div>

  <!-- ===== 题目页 ===== -->

      <button class="back-btn" onclick="goBack()">←</button>

    <button class="continue-btn" id="continue-btn" onclick="nextQuestion()" disabled>继续 →</button>

  <!-- ===== 结果页 ===== -->

    <div class="result-desc" id="res-desc"></div>
    <button class="retry-btn" onclick="location.reload()">再测一次</button>
    <div class="result-footer">分享你的猫格，寻找同类 🐾</div>
  </div>

</div>

<script>
const breeds = [
  { id:'ragdoll',    name:'布偶猫',      en:'Ragdoll',           emoji:'😻', traits:['温柔','粘人','优雅'],      desc:'你是猫界的小仙女/小王子。极其依赖亲密关系，性格温顺，走到哪里都自带治愈光环。你不需要刻意讨好任何人，温柔本身就是你最大的魔力。' },

  { id:'russian',   name:'俄罗斯蓝猫',  en:'Russian Blue',      emoji:'😾', traits:['高冷','细腻','忠诚'],      desc:'你拥有极高的审美和细腻的情感。在陌生人面前你总是那个最冷静的存在，但一旦认定了一个人，就会默默守护他/她到底，这种深情藏得太深，懂的人才懂。' },

  { id:'aby',       name:'阿比西尼亚猫', en:'Abyssinian',        emoji:'🐈‍⬛', traits:['聪明','好奇','行动派'],  desc:'你是一个天生的"极客"。对世界充满了永不熄灭的好奇心，喜欢动手解决一切问题。别人还在想的时候你已经开始干了，这就是你的节奏。' },
  { id:'scottish',  name:'苏格兰折耳猫', en:'Scottish Fold',    emoji:'😽', traits:['乖巧','平和','知足'],      desc:'你是一个温和的理想主义者。不需要大风大浪，一个温暖的角落、几个真心的朋友，就是你全部的幸福。你的满足感来得很容易，这是一种天赋。' },
  { id:'sphynx',    name:'无毛猫',      en:'Sphynx',            emoji:'🙀', traits:['独特','热情','不走寻常路'],'desc':'你拒绝被任何标签定义。独特的外表下藏着一颗比任何人都热情的心。很多人第一眼不懂你，但了解之后都会被你彻底圈粉——因为世界上再找不出第二个你。' },

const questions = [
  { hint:'社交还是不社交，这是个问题', avatar:'😸',
    text:'在外面遇到了一只从没见过的陌生猫，你怎么做？',

    text:'你最喜欢待的地方是？',
    options:[
      { text:'最高的那个地方，必须全场尽在眼底', scores:{ bengal:3, aby:3 } },

let current = 0;
let selected = null;
let scores = {};
breeds.forEach(b => scores[b.id] = 0);

function show(pageId) {
  ['start-page','quiz-page','result-page'].forEach(id => {
    const el = document.getElementById(id);
    el.style.display = 'none';
  });
  const target = document.getElementById(pageId);
  target.style.display = 'flex';
  target.classList.add('page-in');
  setTimeout(() => target.classList.remove('page-in'), 400);
}

function startTest() {
  current = 0;
  scores = {};
  breeds.forEach(b => scores[b.id] = 0);
  show('quiz-page');
  renderQuestion();
}

function renderQuestion() {
  const q = questions[current];
  selected = null;

  document.getElementById('q-count').innerText = `${current + 1} / ${questions.length}`;
  document.getElementById('progress-fill').style.width = `${((current + 1) / questions.length) * 100}%`;
  document.getElementById('q-avatar').innerText = q.avatar;
  document.getElementById('q-hint-text').innerText = q.hint;
  document.getElementById('q-text').innerText = q.text;

  const optionsEl = document.getElementById('options');
  optionsEl.innerHTML = '';
  const labels = ['A','B','C','D'];
  q.options.forEach((opt, i) => {
    const div = document.createElement('div');
    div.className = 'option-item';
    div.innerHTML = `<div class="option-label">${labels[i]}</div><div class="option-text">${opt.text}</div>`;
    div.onclick = () => selectOption(div, i);
    optionsEl.appendChild(div);
  });

  const btn = document.getElementById('continue-btn');
  btn.disabled = true;
}

function selectOption(el, idx) {
  document.querySelectorAll('.option-item').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  selected = idx;
  document.getElementById('continue-btn').disabled = false;
}

function nextQuestion() {
  if (selected === null) return;
  const optScores = questions[current].options[selected].scores;
  for (let id in optScores) scores[id] = (scores[id] || 0) + optScores[id];

  if (current < questions.length - 1) {
    current++;
    renderQuestion();
  } else {
    showResult();
  }
}

function goBack() {
  if (current > 0) {
    current--;
    renderQuestion();
  } else {
    show('start-page');
  }
}

function showResult() {
  let max = -1, winner = null;
  for (let id in scores) {
    if (scores[id] > max) { max = scores[id]; winner = id; }
  }
  const breed = breeds.find(b => b.id === winner);

  document.getElementById('res-name').innerText = breed.name;
  document.getElementById('res-en').innerText = breed.en;
  document.getElementById('res-avatar').innerText = breed.emoji;
  document.getElementById('res-desc').innerText = breed.desc;

  const traitsEl = document.getElementById('res-traits');
  traitsEl.innerHTML = '';
  breed.traits.forEach(t => {
    const span = document.createElement('span');
    span.className = 'result-trait';
    span.innerText = t;
    traitsEl.appendChild(span);
  });

  show('result-page');
}
</script>
</body>
</html>
